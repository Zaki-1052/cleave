<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;">

        <!-- Header -->
        <tr>
          <td style="background-color:#4AAED9;padding:24px 32px;">
            <span style="color:#ffffff;font-size:22px;font-weight:bold;">{{ app_name }}</span>
          </td>
        </tr>

        <!-- Heading -->
        <tr>
          <td style="padding:24px 32px 0;">
            <h2 style="margin:0;color:#333333;font-size:20px;">Reset Your Password</h2>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:16px 32px;color:#555;font-size:14px;line-height:1.6;">
            Hi {{ user_name }},<br><br>
            We received a request to reset your {{ app_name }} password.
            Click the button below to choose a new password.
          </td>
        </tr>

        <!-- CTA button -->
        <tr>
          <td style="padding:8px 32px 24px;" align="center">
            <a href="{{ reset_url }}" style="display:inline-block;padding:12px 32px;background-color:#4AAED9;color:#ffffff;text-decoration:none;border-radius:24px;font-size:15px;font-weight:bold;">
              Reset Password
            </a>
          </td>
        </tr>

        <!-- Expiry notice -->
        <tr>
          <td style="padding:0 32px 24px;color:#999;font-size:13px;">
            This link expires in 1 hour. If you didn't request a password reset, you can safely ignore this email.
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
